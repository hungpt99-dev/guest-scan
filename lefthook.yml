pre-commit:
  parallel: true
  commands:
    format-check:
      run: pnpm format:check
      skip:
        - merge
        - rebase
    lint:
      run: pnpm lint
      skip:
        - merge
        - rebase
    typecheck:
      run: pnpm typecheck
      skip:
        - merge
        - rebase
    secret-scan:
      run: pnpm secrets:scan
      skip:
        - merge
        - rebase

pre-push:
  parallel: false
  commands:
    verify:
      run: pnpm verify
    codegraph:
      run: pnpm codegraph

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
